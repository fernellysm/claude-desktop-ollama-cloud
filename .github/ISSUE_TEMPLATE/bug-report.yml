name: Bug report
description: Report a problem with install, restore, or routing.
title: "[bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please do not paste API keys, tokens, or private logs.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the problem and what you expected.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run ...
        2. Open ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: versions
    attributes:
      label: Versions
      placeholder: |
        macOS:
        Claude Desktop:
        Claude Code CLI:
        Ollama:
        Model:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant non-sensitive logs
      description: Paste sanitized output from the smoke test or wrapper log.
      render: text
    validations:
      required: false
